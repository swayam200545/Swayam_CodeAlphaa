<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player — Swayam Dhokte</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --card: #13131f;
    --elevated: #1a1a2e;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --accent3: #34d399;
    --text: #f1f0f5;
    --muted: #6b6b8a;
    --border: rgba(167,139,250,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
    animation: blobFloat 8s ease-in-out infinite;
  }
  .blob1 { width: 500px; height: 500px; background: rgba(167,139,250,0.12); top: -150px; right: -100px; animation-delay: 0s; }
  .blob2 { width: 400px; height: 400px; background: rgba(244,114,182,0.08); bottom: -100px; left: -100px; animation-delay: 3s; }
  .blob3 { width: 300px; height: 300px; background: rgba(52,211,153,0.06); top: 40%; left: 50%; animation-delay: 6s; }
  @keyframes blobFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px, -30px) scale(1.05); }
  }

  /* BADGE */
  .badge {
    position: fixed; top: 1.5rem; right: 1.5rem;
    background: rgba(167,139,250,0.15); border: 1px solid var(--border);
    padding: 6px 16px; font-size: 0.6rem; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent);
    font-family: 'Unbounded', sans-serif;
    z-index: 100;
  }

  /* LAYOUT */
  .app {
    position: relative; z-index: 10;
    width: 100%; max-width: 960px;
    padding: 2rem;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto auto;
    gap: 1.5rem;
  }

  /* ---- PLAYER CARD ---- */
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2.5rem;
    grid-column: 1;
    grid-row: 1;
    position: relative;
    overflow: hidden;
  }
  .player-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.6;
  }

  /* Album Art */
  .album-area {
    display: flex; gap: 2rem; align-items: center; margin-bottom: 2.5rem;
  }
  .album-art-wrap {
    position: relative; flex-shrink: 0;
  }
  .album-art {
    width: 160px; height: 160px;
    border-radius: 2px;
    background: var(--elevated);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .album-emoji {
    font-size: 5rem;
    transition: transform 0.4s;
    animation: none;
  }
  .album-emoji.spinning { animation: spin 8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Vinyl ring */
  .vinyl-ring {
    position: absolute; inset: -6px;
    border: 2px solid rgba(167,139,250,0.25);
    border-radius: 2px;
    animation: none;
  }
  .vinyl-ring.pulse { animation: ringPulse 2s ease-in-out infinite; }
  @keyframes ringPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.3); }
    50% { box-shadow: 0 0 30px 8px rgba(167,139,250,0.15); }
  }

  /* Song info */
  .song-info { flex: 1; }
  .now-playing-tag {
    font-size: 0.6rem; letter-spacing: 3px; color: var(--accent);
    text-transform: uppercase; font-family: 'Unbounded', sans-serif;
    margin-bottom: 0.8rem;
    display: flex; align-items: center; gap: 8px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent3);
    animation: livePulse 1.5s ease-in-out infinite;
  }
  .live-dot.paused { animation: none; background: var(--muted); }
  @keyframes livePulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .song-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    line-height: 1.2; margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--text), rgba(241,240,245,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .song-artist {
    font-size: 0.9rem; color: var(--muted); margin-bottom: 0.4rem;
  }
  .song-album {
    font-size: 0.75rem; color: rgba(167,139,250,0.6); letter-spacing: 1px;
  }
  .song-meta {
    display: flex; gap: 1rem; margin-top: 1rem;
  }
  .meta-tag {
    font-size: 0.62rem; letter-spacing: 1px;
    background: rgba(167,139,250,0.1); border: 1px solid var(--border);
    padding: 3px 10px; color: var(--accent); border-radius: 999px;
  }

  /* Progress Bar */
  .progress-section { margin-bottom: 1.8rem; }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--muted);
    font-family: 'Unbounded', sans-serif; margin-bottom: 0.6rem;
  }
  .progress-track {
    width: 100%; height: 4px;
    background: var(--elevated);
    border-radius: 999px; cursor: pointer;
    position: relative;
    overflow: visible;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute; right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(167,139,250,0.8);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .progress-track:hover .progress-fill::after { opacity: 1; }

  /* Controls */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 1.2rem;
  }
  .ctrl-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.2s;
    position: relative;
  }
  .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .ctrl-btn.active { color: var(--accent); }
  .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }

  .play-btn {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1.4rem;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(167,139,250,0.35);
  }
  .play-btn:hover { transform: scale(1.08); box-shadow: 0 12px 40px rgba(167,139,250,0.5); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 24px; height: 24px; fill: #fff; }

  /* Volume */
  .volume-row {
    display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem;
  }
  .vol-icon { font-size: 1rem; color: var(--muted); cursor: pointer; width: 24px; }
  .volume-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; border-radius: 999px;
    background: var(--elevated); outline: none; cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer; box-shadow: 0 0 8px rgba(167,139,250,0.6);
  }
  .vol-pct { font-size: 0.72rem; color: var(--muted); font-family: 'Unbounded', sans-serif; min-width: 32px; text-align: right; }

  /* ---- VISUALIZER ---- */
  .visualizer {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 4px; height: 48px; margin-bottom: 1.5rem;
  }
  .bar {
    width: 4px; border-radius: 999px;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    transition: height 0.15s ease;
    min-height: 4px;
  }

  /* ---- PLAYLIST ---- */
  .playlist-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .playlist-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent3), transparent);
    opacity: 0.6;
  }
  .playlist-header {
    padding: 1.5rem 1.5rem 1rem;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .playlist-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem; letter-spacing: 2px; font-weight: 700;
    text-transform: uppercase;
  }
  .playlist-count {
    font-size: 0.65rem; color: var(--muted);
    font-family: 'Unbounded', sans-serif;
  }
  .playlist-list {
    flex: 1; overflow-y: auto; padding: 0.5rem 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .playlist-item {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.85rem 1.5rem; cursor: pointer;
    transition: background 0.2s; border-left: 2px solid transparent;
  }
  .playlist-item:hover { background: rgba(255,255,255,0.03); }
  .playlist-item.active {
    background: rgba(167,139,250,0.08);
    border-left-color: var(--accent);
  }
  .track-num {
    font-size: 0.65rem; color: var(--muted);
    font-family: 'Unbounded', sans-serif;
    min-width: 20px; text-align: center;
  }
  .playlist-item.active .track-num { color: var(--accent); }
  .track-emoji { font-size: 1.4rem; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 0.82rem; font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .playlist-item.active .track-name { color: var(--accent); }
  .track-artist { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-dur { font-size: 0.68rem; color: var(--muted); font-family: 'Unbounded', sans-serif; flex-shrink: 0; }

  /* Sound waves for active track */
  .sound-wave {
    display: none; align-items: flex-end; gap: 2px;
    height: 14px;
  }
  .playlist-item.active.playing .sound-wave { display: flex; }
  .playlist-item.active.playing .track-num { display: none; }
  .wave-bar {
    width: 3px; border-radius: 999px;
    background: var(--accent);
  }
  .wave-bar:nth-child(1) { animation: wave 0.8s ease-in-out infinite; animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation: wave 0.8s ease-in-out infinite; animation-delay: 0.2s; }
  .wave-bar:nth-child(3) { animation: wave 0.8s ease-in-out infinite; animation-delay: 0.1s; }
  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 13px; }
  }

  /* ---- EQ / INFO ROW ---- */
  .info-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    grid-column: 1;
    grid-row: 2;
    padding: 1.2rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 2rem;
  }
  .info-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .info-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .info-label { font-size: 0.6rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .info-divider { width: 1px; height: 36px; background: var(--border); }

  /* RESPONSIVE */
  @media(max-width: 760px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto auto; padding: 1rem; gap: 1rem; }
    .playlist-card { grid-column: 1; grid-row: 3; max-height: 320px; }
    .info-row { grid-column: 1; grid-row: 2; flex-wrap: wrap; justify-content: center; gap: 1rem; }
    .album-area { flex-direction: column; align-items: flex-start; }
    .album-art { width: 120px; height: 120px; }
    .song-title { font-size: 1.2rem; }
    .badge { display: none; }
  }
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<div class="badge">Syncify</div>

<div class="app">

  <!-- PLAYER CARD -->
  <div class="player-card">
    <div class="album-area">
      <div class="album-art-wrap">
        <div class="album-art">
          <div class="album-emoji" id="albumEmoji">🎵</div>
        </div>
        <div class="vinyl-ring" id="vinylRing"></div>
      </div>
      <div class="song-info">
        <div class="now-playing-tag">
          <div class="live-dot" id="liveDot"></div>
          Now Playing
        </div>
        <div class="song-title" id="songTitle">Select a Track</div>
        <div class="song-artist" id="songArtist">—</div>
        <div class="song-album" id="songAlbum">—</div>
        <div class="song-meta" id="songMeta"></div>
      </div>
    </div>

    <!-- Visualizer -->
    <div class="visualizer" id="visualizer"></div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn" title="Shuffle" onclick="toggleShuffle()">
        <svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4V8h-1.5c-1 0-1.8.5-2.5 1.3L11.5 11 10 9.4C11 8.2 12.3 7 14.5 7H17V3zm0 14h-2.5c-2.2 0-3.5-1.2-4.5-2.4L5.5 9.5C4.7 8.5 3.9 8 3 8H1V6h2c1.8 0 3 1 4.2 2.4L11.5 14c1 1.2 1.8 1.5 2.5 1.5H17v-3l4 4-4 4v-3z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" title="Repeat" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <span class="vol-icon" id="volIcon" onclick="toggleMute()">🔊</span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      <span class="vol-pct" id="volPct">80%</span>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-card">
    <div class="playlist-header">
      <div class="playlist-title">Playlist</div>
      <div class="playlist-count" id="plCount">0 tracks</div>
    </div>
    <div class="playlist-list" id="playlistList"></div>
  </div>

  <!-- INFO ROW -->
  <div class="info-row">
    <div class="info-item">
      <div class="info-val" id="infoTrack">—</div>
      <div class="info-label">Track</div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <div class="info-val" id="infoGenre">—</div>
      <div class="info-label">Genre</div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <div class="info-val" id="infoBPM">—</div>
      <div class="info-label">BPM</div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <div class="info-val" id="infoYear">—</div>
      <div class="info-label">Year</div>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <div class="info-val" id="infoKey">—</div>
      <div class="info-label">Key</div>
    </div>
  </div>

</div>

<script>
// ─── PLAYLIST DATA ─────────────────────────────────────────
const playlist = [
  { title: 'Cosmic Drift', artist: 'Stellar Waves', album: 'Nebula Sessions', emoji: '🌌', duration: 213, genre: 'Ambient', bpm: 90, year: 2023, key: 'Am', tags: ['Chill', 'Space'] },
  { title: 'Neon Pulse', artist: 'Cyber Fox', album: 'Digital Nights', emoji: '🦊', duration: 187, genre: 'Synthwave', bpm: 128, year: 2024, key: 'Dm', tags: ['Electronic', 'Retro'] },
  { title: 'Ocean Floor', artist: 'The Blue Tides', album: 'Depths', emoji: '🌊', duration: 245, genre: 'Lo-fi', bpm: 75, year: 2023, key: 'C', tags: ['Lo-fi', 'Calm'] },
  { title: 'Fire Dance', artist: 'Ember Rising', album: 'Ignite', emoji: '🔥', duration: 198, genre: 'Electronic', bpm: 140, year: 2024, key: 'Em', tags: ['Dance', 'Energy'] },
  { title: 'Forest Rain', artist: 'Natura', album: 'Earthscapes', emoji: '🌲', duration: 267, genre: 'Ambient', bpm: 60, year: 2022, key: 'G', tags: ['Nature', 'Meditative'] },
  { title: 'Midnight Drive', artist: 'Solo Miles', album: 'City Lights', emoji: '🌙', duration: 221, genre: 'Jazz', bpm: 95, year: 2023, key: 'Bb', tags: ['Jazz', 'Night'] },
  { title: 'Solar Flare', artist: 'AstroBeats', album: 'Heliosphere', emoji: '☀️', duration: 176, genre: 'EDM', bpm: 150, year: 2024, key: 'F#m', tags: ['EDM', 'Intense'] },
  { title: 'Velvet Dreams', artist: 'Luna Rosa', album: 'Silk Road', emoji: '🌹', duration: 239, genre: 'R&B', bpm: 82, year: 2023, key: 'Db', tags: ['Soul', 'Smooth'] },
];

// ─── STATE ─────────────────────────────────────────────────
let currentIdx = 0;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let isMuted = false;
let prevVolume = 80;
let currentTime = 0;
let progressInterval = null;
let vizInterval = null;

// ─── BUILD PLAYLIST UI ─────────────────────────────────────
function buildPlaylist() {
  const list = document.getElementById('playlistList');
  document.getElementById('plCount').textContent = `${playlist.length} tracks`;
  list.innerHTML = playlist.map((t, i) => `
    <div class="playlist-item" id="plItem${i}" onclick="selectTrack(${i})">
      <div class="track-num">${String(i+1).padStart(2,'0')}</div>
      <div class="sound-wave">
        <div class="wave-bar" style="height:4px"></div>
        <div class="wave-bar" style="height:10px"></div>
        <div class="wave-bar" style="height:7px"></div>
      </div>
      <div class="track-emoji">${t.emoji}</div>
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <div class="track-dur">${formatTime(t.duration)}</div>
    </div>
  `).join('');
}

// ─── BUILD VISUALIZER BARS ─────────────────────────────────
function buildVisualizer() {
  const viz = document.getElementById('visualizer');
  viz.innerHTML = Array.from({length: 32}, (_,i) =>
    `<div class="bar" id="bar${i}" style="height:4px"></div>`
  ).join('');
}

function animateViz() {
  if (vizInterval) clearInterval(vizInterval);
  vizInterval = setInterval(() => {
    for (let i = 0; i < 32; i++) {
      const bar = document.getElementById(`bar${i}`);
      if (!bar) continue;
      const h = isPlaying ? Math.random() * 42 + 4 : 4;
      bar.style.height = h + 'px';
    }
  }, 120);
}

// ─── TRACK SELECTION ───────────────────────────────────────
function selectTrack(idx) {
  currentIdx = idx;
  currentTime = 0;
  loadTrack();
  play();
}

function loadTrack() {
  const t = playlist[currentIdx];
  document.getElementById('songTitle').textContent = t.title;
  document.getElementById('songArtist').textContent = t.artist;
  document.getElementById('songAlbum').textContent = t.album;
  document.getElementById('albumEmoji').textContent = t.emoji;
  document.getElementById('totalTime').textContent = formatTime(t.duration);
  document.getElementById('currentTime').textContent = formatTime(currentTime);
  document.getElementById('progressFill').style.width = '0%';
  // Meta tags
  document.getElementById('songMeta').innerHTML = t.tags.map(tag => `<span class="meta-tag">${tag}</span>`).join('');
  // Info row
  document.getElementById('infoTrack').textContent = `${currentIdx+1}/${playlist.length}`;
  document.getElementById('infoGenre').textContent = t.genre;
  document.getElementById('infoBPM').textContent = t.bpm;
  document.getElementById('infoYear').textContent = t.year;
  document.getElementById('infoKey').textContent = t.key;
  // Playlist highlight
  document.querySelectorAll('.playlist-item').forEach((el,i) => {
    el.classList.toggle('active', i === currentIdx);
    el.classList.remove('playing');
  });
  // Scroll active into view
  const activeEl = document.getElementById(`plItem${currentIdx}`);
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─── PLAY / PAUSE ──────────────────────────────────────────
function play() {
  isPlaying = true;
  updatePlayBtn();
  startProgress();
  animateViz();
  document.getElementById('albumEmoji').classList.add('spinning');
  document.getElementById('vinylRing').classList.add('pulse');
  document.getElementById('liveDot').classList.remove('paused');
  const activeEl = document.getElementById(`plItem${currentIdx}`);
  if (activeEl) activeEl.classList.add('playing');
}

function pause() {
  isPlaying = false;
  updatePlayBtn();
  clearInterval(progressInterval);
  document.getElementById('albumEmoji').classList.remove('spinning');
  document.getElementById('vinylRing').classList.remove('pulse');
  document.getElementById('liveDot').classList.add('paused');
  const activeEl = document.getElementById(`plItem${currentIdx}`);
  if (activeEl) activeEl.classList.remove('playing');
}

function togglePlay() {
  if (!isPlaying) {
    if (currentTime === 0) loadTrack();
    play();
  } else {
    pause();
  }
}

function updatePlayBtn() {
  const icon = document.getElementById('playIcon');
  icon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// ─── PROGRESS ──────────────────────────────────────────────
function startProgress() {
  clearInterval(progressInterval);
  const t = playlist[currentIdx];
  progressInterval = setInterval(() => {
    currentTime++;
    if (currentTime >= t.duration) {
      clearInterval(progressInterval);
      handleTrackEnd();
      return;
    }
    const pct = (currentTime / t.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('currentTime').textContent = formatTime(currentTime);
  }, 1000);
}

function handleTrackEnd() {
  if (isRepeat) {
    currentTime = 0; play();
  } else {
    nextTrack();
  }
}

// Progress click
document.getElementById('progressTrack').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const t = playlist[currentIdx];
  currentTime = Math.floor(pct * t.duration);
  document.getElementById('progressFill').style.width = (pct * 100) + '%';
  document.getElementById('currentTime').textContent = formatTime(currentTime);
  if (isPlaying) { clearInterval(progressInterval); startProgress(); }
});

// ─── NAVIGATION ────────────────────────────────────────────
function nextTrack() {
  if (isShuffle) {
    let next;
    do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIdx);
    currentIdx = next;
  } else {
    currentIdx = (currentIdx + 1) % playlist.length;
  }
  currentTime = 0;
  loadTrack();
  if (isPlaying) play();
}

function prevTrack() {
  if (currentTime > 3) {
    currentTime = 0;
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('currentTime').textContent = '0:00';
    if (isPlaying) { clearInterval(progressInterval); startProgress(); }
    return;
  }
  currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
  currentTime = 0;
  loadTrack();
  if (isPlaying) play();
}

// ─── SHUFFLE / REPEAT ──────────────────────────────────────
function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
}
function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
}

// ─── VOLUME ────────────────────────────────────────────────
function setVolume(val) {
  prevVolume = val;
  document.getElementById('volPct').textContent = val + '%';
  updateVolIcon(val);
  // Style the slider fill
  const slider = document.getElementById('volumeSlider');
  slider.style.background = `linear-gradient(to right, var(--accent) ${val}%, var(--elevated) ${val}%)`;
}

function toggleMute() {
  isMuted = !isMuted;
  const slider = document.getElementById('volumeSlider');
  if (isMuted) {
    slider.value = 0;
    setVolume(0);
  } else {
    slider.value = prevVolume;
    setVolume(prevVolume);
  }
}

function updateVolIcon(val) {
  const icon = document.getElementById('volIcon');
  if (val == 0) icon.textContent = '🔇';
  else if (val < 40) icon.textContent = '🔈';
  else if (val < 70) icon.textContent = '🔉';
  else icon.textContent = '🔊';
}

// ─── UTILS ─────────────────────────────────────────────────
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
  if (e.code === 'KeyS') toggleShuffle();
  if (e.code === 'KeyR') toggleRepeat();
});

// ─── INIT ──────────────────────────────────────────────────
buildPlaylist();
buildVisualizer();
loadTrack();
// Init volume slider gradient
setVolume(80);
// Idle viz animation
animateViz();
</script>
</body>
